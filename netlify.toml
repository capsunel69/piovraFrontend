[build]
  command = "npm run build"
  publish = "dist"

[dev]
  command = "npm run dev"
  publish = "dist"

# All API calls now go directly to Piovra (configured via VITE_PIOVRA_BASE_URL).
# No Netlify functions, no MongoDB. Auth is via the piovra_sid cookie set by
# the Google OAuth flow at /auth/google.
